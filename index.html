<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>智慧课堂助手 Pro - 云端版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #8da4b4; --bg: #f5f7f9; --text: #4a4e51; --white: #ffffff; --color-absent: #fa5252; --color-present: #82c91e; }
        body { background: var(--bg); color: var(--text); font-family: "PingFang SC", sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .hidden { display: none !important; }
        .card { background: var(--white); border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative; text-align: center; }
        .grid-6 { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .btn { padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        
        /* 登录框样式 */
        #view-login { height: 80vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* 其他样式 */
        .sync-tag { font-size: 0.8rem; color: #2ecc71; margin-left: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 1.2rem; }
        .stu-no { position: absolute; top: 8px; left: 10px; color: #aaa; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <section id="view-login">
        <div class="login-box">
            <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2>教师云端登录</h2>
            <input type="email" id="email" placeholder="电子邮箱">
            <input type="password" id="password" placeholder="密码">
            <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">登录系统</button>
        </div>
    </section>

    <section id="view-app" class="hidden">
        <header style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd; padding-bottom:15px; margin-bottom:20px;">
            <div>
                <h2 style="margin:0;"><i class="fas fa-graduation-cap"></i> 智慧课堂云端版</h2>
                <span id="sync-status" class="sync-tag"><i class="fas fa-check"></i> 云端已同步</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button id="btnBack" class="btn hidden" style="background:#666; color:white;" onclick="router.back()">返回班级列表</button>
                <button class="btn" style="background:#eee" onclick="handleLogout()">安全登出</button>
            </div>
        </header>

        <div id="view-home" class="sub-view hidden">
            <div class="grid-6" id="homeClassGrid"></div>
        </div>

        <div id="view-scores" class="sub-view hidden">
            <div style="background:white; padding:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 id="currentClassName" style="margin:0"></h3>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-primary" onclick="batchImport()"><i class="fas fa-file-import"></i> 批量导入名单</button>
                    <button class="btn" style="border:1px solid #ddd" onclick="exportScoresXLSX()">导出 Excel 成绩</button>
                </div>
            </div>
            <div id="scoreGrid" class="grid-6"></div>
        </div>
    </section>
</div>

<script>
    const SUPABASE_URL = 'https://bfshfphggmmrffuhmear.supabase.co'; 
    const SUPABASE_KEY = 'sb_publishable_-6EG_xq1e50k75uGPc3mhA_dfQ8K75W';
    // ==========================================

    // 初始化 Supabase
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let db = {};
    let currentUser = null;
    let currentClass = "";
    // 预设班级名称
    const CLASS_NAMES = ["骨伤2班", "治疗1班", "社体1班", "体能1班", "体教8班", "民传1班", "运训2班"];

    // 登录功能
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.querySelector('#view-login .btn');
        btn.innerText = "正在连接云端服务器...";
        
        try {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                alert("登录失败，请检查账号密码: " + error.message);
                btn.innerText = "登录系统";
            } else {
                currentUser = data.user;
                initApp();
            }
        } catch (err) {
            alert("网络连接异常，请重试！");
            btn.innerText = "登录系统";
        }
    }

    // 登出功能
    async function handleLogout() { 
        await sb.auth.signOut(); 
        location.reload(); 
    }

    // 初始化应用数据
    async function initApp() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-app').classList.remove('hidden');
        
        const { data } = await sb.from('classroom_data').select('data').eq('id', currentUser.id).single();
        if (data) {
            db = data.data;
        } else {
            CLASS_NAMES.forEach(n => db[n] = { students: [] });
            await saveToCloud();
        }
        router.go('view-home');
    }

    // 保存数据到云端
    async function saveToCloud() {
        document.getElementById('sync-status').innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
        await sb.from('classroom_data').upsert({ id: currentUser.id, data: db, updated_at: new Date() });
        document.getElementById('sync-status').innerHTML = '<i class="fas fa-check"></i> 云端已同步';
    }

    // 页面路由控制
    const router = {
        stack: [],
        go(viewId) {
            document.querySelectorAll('.sub-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            document.getElementById('btnBack').classList.toggle('hidden', viewId === 'view-home');
            this.stack.push(viewId);
            if (viewId === 'view-home') renderHome();
            if (viewId === 'view-scores') renderScores();
        },
        back() { this.stack.pop(); this.go(this.stack.pop()); }
    };

    // 渲染首页班级列表
    function renderHome() {
        const grid = document.getElementById('homeClassGrid');
        grid.innerHTML = CLASS_NAMES.map(name => `
            <div class="card" style="cursor:pointer" onclick="currentClass='${name}'; router.go('view-scores')">
                <i class="fas fa-users" style="font-size:2rem; color:var(--primary)"></i>
                <h3>${name}</h3>
                <p>${db[name]?.students?.length || 0} 人</p>
            </div>`).join('');
    }

    // 渲染班级学生列表
    function renderScores() {
        document.getElementById('currentClassName').innerText = currentClass;
        const students = db[currentClass].students || [];
        document.getElementById('scoreGrid').innerHTML = students.map(s => `
            <div class="card">
                <div class="stu-no">#${s.no}</div>
                <div class="avatar" style="background:hsl(${(s.no*137)%360},60%,70%)">${s.name[0]}</div>
                <div><b>${s.name}</b></div>
                <div style="font-size:1.5rem; margin:10px 0; font-weight:bold; color:var(--primary)">${s.score}</div>
                <div style="display:flex; justify-content:center; gap:10px">
                    <button class="btn" style="background:var(--color-absent); color:white; padding:5px 12px" onclick="changeScore('${s.id}',-1)">-1</button>
                    <button class="btn" style="background:var(--color-present); color:white; padding:5px 12px" onclick="changeScore('${s.id}',1)">+1</button>
                </div>
            </div>`).join('');
    }

    // 修改分数
    function changeScore(sid, delta) {
        const s = db[currentClass].students.find(x => x.id === sid);
        if(s) {
            s.score = Math.max(0, s.score + delta); // 分数不低于0
            renderScores();
            saveToCloud();
        }
    }

    // 批量导入名单功能
    function batchImport() {
        const raw = prompt("请从 Excel 复制并粘贴名单（格式：学号 姓名，中间有空格，每行一个）：");
        if(!raw) return;
        const lines = raw.trim().split('\n');
        const newList = lines.map((line, index) => {
            const parts = line.trim().split(/\s+/);
            return { 
                id: parts[0] || Date.now()+index, 
                name: parts[1] || parts[0] || "未知", 
                no: index+1, 
                score: 0 
            };
        });
        if(confirm(`成功识别到 ${newList.length} 名学生，是否覆盖当前班级名单？\n注意：这将清空该班级现有的成绩！`)) {
            db[currentClass].students = newList;
            renderScores();
            saveToCloud();
        }
    }

    // 导出 Excel 功能
    function exportScoresXLSX() {
        const data = db[currentClass].students.map(s => ({ "序号": s.no, "学号": s.id, "姓名": s.name, "得分": s.score }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "成绩表");
        XLSX.writeFile(wb, `${currentClass}_课堂成绩.xlsx`);
    }
</script>
</body>
</html>
